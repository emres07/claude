spring:
  application:
    name: calendar-app
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: calendar_app
    password: welcome123
    driver-class-name: oracle.jdbc.OracleDriver

server:
  port: 8080
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.example.calendarapp: DEBUG