spring:
  application:
    name: backend-application

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: ${DB_USER:todo}
    password: ${DB_PASSWORD:welcome123}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  security:
    user:
      name: admin
      password: admin

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.example: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
